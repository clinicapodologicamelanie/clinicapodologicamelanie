<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>¡Cita Solicitada! - Clínica Podológica Melanie Estepa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #217b8a;
      --primary-dark: #165662;
      --accent-bg: #eaf3f5;
      --text-main: #2c3e50;
      --text-muted: #5a6c7d;
      --font-body: 'Montserrat', sans-serif;
      --font-heading: 'Playfair Display', serif;
      --shadow-lg: 0 20px 40px rgba(33, 123, 138, 0.15);
      --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: linear-gradient(135deg, rgba(234,243,245,0.9) 0%, rgba(255,255,255,0.9) 100%),
                  url("https://images.unsplash.com/photo-1579684385127-1ef15d508118?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80") center/cover;
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    .success-card {
      background: white;
      padding: 60px 40px;
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
      max-width: 600px;
      width: 100%;
      border-top: 5px solid var(--primary);
      animation: fadeInUp 0.8s ease-out;
    }
    .icon-container {
      width: 80px;
      height: 80px;
      background-color: var(--accent-bg);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 30px;
    }
    .icon-container svg {
      width: 40px;
      height: 40px;
      fill: var(--primary);
    }
    h1 {
      font-family: var(--font-heading);
      color: var(--primary-dark);
      font-size: 2.2rem;
      margin-bottom: 20px;
    }
    p {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 40px;
      line-height: 1.6;
    }
    .btn-primary {
      display: inline-block;
      background-color: var(--primary);
      color: white;
      padding: 16px 40px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      text-decoration: none;
      transition: var(--transition);
    }
    .btn-primary:hover {
      background-color: var(--primary-dark);
      transform: translateY(-3px);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="icon-container">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
    </div>
    <h1>¡Solicitud de cita recibida!</h1>
    <p>Muchas gracias por confiar en nosotros. Hemos recibido tus datos correctamente. Nuestro equipo se pondrá en contacto contigo lo antes posible para confirmar la fecha y hora exacta de tu cita.</p>
    <a href="index.html" class="btn-primary">Volver a la página principal</a>
  </div>
</body>
</html>
